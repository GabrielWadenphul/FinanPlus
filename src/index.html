<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">

    <title> Finan+ | Acompanhe Suas Finanças de Modo Simples!</title>
</head>
<body class="body">
<img class="img-logo" src="img/logofinan.png" alt="Ícone Finan+">

    <div class="login">
        <div class="luz"></div>
        <img class="imagem" src="img/login.webp" alt="Ícone login">
        <h3>Bem vindo ao Finan+</h3>
        <p>Faça login para acompanhar suas finanças</p>
        <label class="login-texto" for="usuario">Usuário:</label>
        <br>
        <input type="text" id="usuario"
               maxlength="50" minlength="3" rows="1" cols="30" placeholder="Digite aqui...">
        </textarea">
        <br>
        <label class="login-texto" for="senha">Senha:</label>
        <br>
        <input id="senha" type="password" name="senha" placeholder="Digite aqui..." required>
        <br>
        <button onclick="validarCredenciais()" class="botao" type="submit">Entrar</button>

</div>

</div>
