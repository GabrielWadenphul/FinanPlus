<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finan+ | Transações</title>
    <link rel="stylesheet" href="transacoes.css">
    <script src="inserts.js" defer></script>
</head>
<body class="body">
<div class="Hero">
    <h1>Bem vindo à Finan+</h1>
</div>

<div class="Topbar">
    <h1>Gerenciamento de Transações</h1>
    <p>Visualize, adicione e edite suas receitas e despesas detalhadas.</p>
</div>

<div class="container-cards">

    <div class="itens">

        <div class="Barra">
            <h3>Filtros Avançados</h3>
        </div>

        <div class="filtros">

            <div class="campo-data">
                <label for="dataInicio">Data Início</label>
                <input type="date" id="dataInicio" name="dataInicio">
            </div>

            <div class="campo-data">
                <label for="dataFim">Data Fim</label>
                <input type="date" id="dataFim" name="dataFim">
            </div>
            <br>

            <div class="Tipo-bar">
                <label for="tipo">Tipo:</label>
                <select id="tipo" name="tipo">
                    <option value="receita">Receita</option>
                    <option value="despesa">Despesa</option>
                </select>
            </div>
            <br>

            <div class="Tipo-bar">
                <label for="categoria">Categoria:</label>
                <select id="categoria">
                    <option value="" disabled selected>Carregando categorias...</option>
                </select>
            </div>
            <br>

            <div class="Ações">
                <button class="Filtrar" id="filtrar">Filtrar</button>
            </div>

            <div class="Ações">
                <button id="abrir-pop-up" class="Adicionar">Adicionar</button>
            </div>

            <div id="pop-up" class="Pop-up-container">

                <div class="Pop-up-conteudo">

                    <span class="fechar-pop-up">&times;</span>

                    <h3>Adicionar nova Transação</h3>

                    <div class="Card-Transacao">

                        <div class="Linha">
                            <div>
                                <label>Data:</label>
                                <input class="Input-transacao" type="date" id="dataTransacao">
                            </div>

                            <div class="Tipo-bar">
                                <label for="tipo">Tipo:</label>
                                <select id="tipoTransacao" name="tipo">
                                    <option value="receita">Receita</option>
                                    <option value="despesa">Despesa</option>
                                </select>
                            </div>
                        </div>

                        <div class="Linha">
                            <div>
                                <label>Categoria:</label>
                                <select id="categoriaTransacao">
                                    <option value="" disabled selected>Carregando categorias...</option>
                                </select>
                            </div>

                            <div>
                                <label>Valor:</label>
                                <input class="Input-transacao" id="valorTransacao" type="number" step="0.01"
                                       placeholder="0.00">
                            </div>
                        </div>

                        <div class="Linha">
                            <div>
                                <label>Descrição:</label>
                                <input class="Input-transacao" id="descricaoTransacao" type="text"
                                       placeholder="Descrição da Transação">
                            </div>

                            <div>
                                <label>Número de Parcelas:</label>
                                <input class="Input-transacao" id="numParcelas" type="number" value="1">
                            </div>
                        </div>

                        <div class="Botoes">
                            <button id="cancelar-transacao" class="Cancelar">Cancelar</button>
                            <button id="adicionar-transacao" class="Adicionar">Adicionar</button>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <div>
        <table class="Tabela">
            <thead>
            <tr>
                <th scope="col">#</th>
                <th scope="col">Data</th>
                <th scope="col">Descrição</th>
                <th scope="col">Categoria</th>
                <th scope="col">Tipo</th>
                <th scope="col">Valor</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <th scope="row">1</th>
            </tr>
            <tr>
                <th scope="row">2</th>
            </tr>
            <tr>
                <th scope="row">3</th>
            </tr>
            <tr>
                <th scope="row">4</th>
            </tr>
            <tr>
                <th scope="row">5</th>
            </tr>
            </tbody>
            <h3>Transações Completas</h3>
        </table>
    </div>

    <div class="Crud-tabela">
        <div class="Editar-tabela">
            <button id="editar-pop-up" class="Editar" id="editar">Editar</button>
        </div>

        <div id="editar-popup" class="Pop-up-container">

            <div class="Pop-up-conteudo">

                <span class="fechar-edicao">&times;</span>

                <h3>Editar Transação</h3>

                <div class="Card-Transacao">

                    <div class="Linha">
                        <div>
                            <label>Data:</label>
                            <input class="Input-transacao" type="date" id="editarData">
                        </div>

                        <div class="Tipo-bar">
                            <label for="tipo">Tipo:</label>
                            <select id="editarTipo" name="tipo">
                                <option value="receita">Receita</option>
                                <option value="despesa">Despesa</option>
                            </select>
                        </div>
                    </div>

                    <div class="Linha">
                        <div>
                            <label>Categoria:</label>
                            <select id="editarCategoria">
                                <option value="" disabled selected>Carregando categorias...</option>
                            </select>
                        </div>

                        <div>
                            <label>Valor:</label>
                            <input class="Input-transacao" id="editarValor" type="number" step="0.01"
                                   placeholder="0.00">
                        </div>
                    </div>

                    <div class="Linha">
                        <div>
                            <label>Descrição:</label>
                            <input class="Input-transacao" id="editarDescricao" type="text"
                                   placeholder="Descrição da Transação">
                        </div>

                        <div>
                            <label>Número de Parcelas:</label>
                            <input class="Input-transacao" id="editarParcelas" type="number" value="1">
                        </div>
                    </div>

                    <div class="Botoes">
                        <button id="cancelar-edicao" class="Cancelar">Cancelar</button>
                        <button id="editar-transacao" class="Adicionar">Editar</button>
                    </div>

                </div>
            </div>
        </div>

        <div class="Excluir-tabela">
            <button class="Excluir" id="excluir">Excluir</button>
        </div>
    </div>

    <div class="Secao">
        <div class="Botao-container">
            <p class="Menu">Menu</p>
            <button class="Botao" onClick="location.href='dashboard.html'">
                <img src="img/dashboard.png" alt="Ícone" class="Icone">
                Dashboard
            </button>
            <button class="Botao" onClick="location.href='transacoes.html'">
                <img src="img/money.png" alt="Ícone" class="Icone">
                Transações
            </button>
            <button class="Botao">
                <img src="img/bill.png" alt="Ícone" class="Icone">
                Relatórios
            </button>
            <button class="Botao" onClick="location.href='perfil.html'">
                <img src="img/perfil.png" alt="Ícone" class="Icone">
                Meu Perfil
            </button>
        </div>
        <button class="Sair" onClick="location.href='index.html'">Sair</button>
    </div>

    <script src="pop-ups.js"></script>
</div>
</body>
</html>
