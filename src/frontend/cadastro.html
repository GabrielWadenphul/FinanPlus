<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Finan+ | Cadastro</title>
    <link rel="stylesheet" href="cadastro.css">
    <script src="script.js"></script>
</head>
<body class="body">
<img class="img-logo" src="img/logofinan.png" alt="Ícone Finan+">

<div class="login">
    <div class="luz"></div>
    <img class="imagem" src="img/login.webp" alt="Ícone login">
    <h3>Bem vindo ao Finan+</h3>
    <p>Cadastre-se para acompanhar suas finanças</p>

    <form class="formulario">
        <div class="input-group">
            <div class="campo">
                <label class="login-texto" for="nome">Nome Completo:</label>
                <input type="text" id="nome" maxlength="100" placeholder="Digite aqui...">
            </div>
            <div class="campo">
                <label class="login-texto" for="usuario">Usuário:</label>
                <input type="text" id="usuario" maxlength="50" minlength="3" placeholder="Digite aqui...">
            </div>
        </div>

        <div class="input-group">
            <div class="campo">
                <label class="login-texto" for="email">E-mail:</label>
                <input type="email" id="email" placeholder="Digite aqui...">
            </div>
            <div class="campo">
                <label class="login-texto" for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="Digite aqui...">
            </div>
        </div>

        <div class="input-group">
            <div class="campo">
                <label class="login-texto" for="data">Nascimento:</label>
                <input type="date" id="data">
            </div>
            <div class="campo">
                <label class="login-texto" for="ocupacao">Ocupação:</label>
                <input type="text" id="ocupacao" placeholder="Digite aqui...">
            </div>
        </div>

        <div class="input-group">
            <div class="campo">
                <label class="login-texto" for="senha">Senha:</label>
                <input id="senha" type="password" placeholder="Digite aqui..." required>
            </div>
            <div class="campo">
                <label class="login-texto" for="confirmarSenha">Confirmar Senha:</label>
                <input id="confirmarSenha" type="password" placeholder="Digite aqui..." required>
            </div>
        </div>

        <button type="submit" class="botao">Cadastrar</button>
    </form>

    <div class="Login">
        <p>Já possui uma conta? <a href="index.html">Faça Login!</a></p>
    </div>
</div>

<div class="footer">
    <p>Finan+ | Gerenciamento de Finanças</p>
    <p>Gabriel Wadenphul | © Todos os direitos reservados</p>
</div>

</body>
</html>
